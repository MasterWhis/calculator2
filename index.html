<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="disp">123456789</div>
        <div class="container-buttons">
            <div class="row-1 row">
                <div class="num">0</div>
                <div class="num">1</div>
                <div class="num">2</div>
                <div class="eq box">=</div>
            </div>
            <div class="row-2 row">
                <div class="num">3</div>
                <div class="num">4</div>
                <div class="num">5</div>
                <div class="divide box op">/</div>
            </div>
            <div class="row-3 row">
                <div class="num">6</div>
                <div class="num">7</div>
                <div class="num">8</div>
                <div class="mult box op">*</div>
            </div>
            <div class="row-4 row">
                <div class="num">9</div>
                <div class="add box op">+</div>
                <div class="sub box op">-</div>
                <div class="clear box">AC</div>
            </div>
        </div>
    </div>



    <script src="script.js"></script>
</body>
</html>
